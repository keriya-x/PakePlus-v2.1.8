<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 智能助手</title>
    
    <!-- 引入样式库 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 框架 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 编译器 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- PDF 处理库: PDF-Lib -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- 字体支持库: Fontkit -->
    <script src="https://unpkg.com/@pdf-lib/fontkit@1.1.1/dist/fontkit.umd.js"></script>
    
    <!-- PDF 读取库: PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .animate-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 模态框动画 */
        .modal-enter {
            opacity: 0;
            transform: scale(0.95);
        }
        .modal-enter-active {
            opacity: 1;
            transform: scale(1);
            transition: opacity 300ms, transform 300ms;
        }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { PDFDocument, rgb, StandardFonts } = PDFLib;

    // 设置 PDF.js worker 路径，用于读取 PDF 内容
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // --- 图标组件 ---
    const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
    const IconFileText = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>;
    const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const IconSort = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>;
    const IconType = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>;
    const IconFont = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 4v16"/><path d="M4 8V6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>;
    const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;

    // --- 模态框组件 ---
    const Modal = ({ isOpen, onClose, onConfirm, title, children }) => {
        if (!isOpen) return null;
        return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-50 transition-opacity">
                <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 animate-in transform scale-100">
                    <h3 className="text-lg font-bold text-gray-900 mb-2">{title}</h3>
                    <div className="text-gray-600 mb-6">{children}</div>
                    <div className="flex justify-end space-x-3">
                        <button onClick={onClose} className="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">
                            暂不需要
                        </button>
                        <button onClick={onConfirm} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2">
                            <IconCheck /> 好的，继续
                        </button>
                    </div>
                </div>
            </div>
        );
    };

    // --- 主应用程序 ---
    function App() {
        const [activeTab, setActiveTab] = useState('numbering'); 
        const [file, setFile] = useState(null);
        const [fontFile, setFontFile] = useState(null);
        const [pageCount, setPageCount] = useState(0);
        
        // 编号功能状态
        const [numbersText, setNumbersText] = useState("");
        const [fontSize, setFontSize] = useState(12);
        const [offsetX, setOffsetX] = useState(20);
        const [offsetY, setOffsetY] = useState(20);
        const [colorHex, setColorHex] = useState("#000000"); 

        // 处理过程状态
        const [isProcessing, setIsProcessing] = useState(false);
        const [downloadUrl, setDownloadUrl] = useState(null);
        const [error, setError] = useState("");
        const [statusMsg, setStatusMsg] = useState("");

        // 连招功能状态
        const [showSortModal, setShowSortModal] = useState(false);
        const [lastGeneratedPdfBytes, setLastGeneratedPdfBytes] = useState(null);
        const [lastGeneratedFileName, setLastGeneratedFileName] = useState("");

        const fileInputRef = useRef(null);

        // --- 文件处理 ---

        const loadFileInfo = async (pdfFile) => {
            try {
                const arrayBuffer = await pdfFile.arrayBuffer();
                const pdfDoc = await PDFDocument.load(arrayBuffer);
                const count = pdfDoc.getPageCount();
                setPageCount(count);
                // 默认生成编号序列
                generateSequence(count, 1, "", "");
                return true;
            } catch (err) {
                setError("无法读取 PDF 文件，请确保文件未损坏。");
                console.error(err);
                return false;
            }
        };

        const handleFileChange = async (e) => {
            const selectedFile = e.target.files[0];
            if (selectedFile && selectedFile.type === 'application/pdf') {
                setFile(selectedFile);
                setError("");
                setDownloadUrl(null);
                setStatusMsg("");
                setLastGeneratedPdfBytes(null);
                await loadFileInfo(selectedFile);
            }
        };

        const handleFontChange = (e) => {
            const selectedFont = e.target.files[0];
            if (selectedFont) {
                setFontFile(selectedFont);
            }
        };

        // --- 逻辑: 添加编号 ---

        const generateSequence = (count, start, pre, suf) => {
            if (count <= 0) return;
            const arr = [];
            for (let i = 0; i < count; i++) {
                arr.push(`${pre}${start + i}${suf}`);
            }
            setNumbersText(arr.join('\n'));
        };

        const processNumbering = async () => {
            if (!file) return;
            setIsProcessing(true);
            setError("");
            setDownloadUrl(null);
            setStatusMsg("正在准备 PDF...");
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdfDoc = await PDFDocument.load(arrayBuffer);
                // 注册 Fontkit
                pdfDoc.registerFontkit(window.fontkit);

                let font;
                
                if (fontFile) {
                    setStatusMsg("正在加载自定义字体...");
                    const fontBytes = await fontFile.arrayBuffer();
                    font = await pdfDoc.embedFont(fontBytes);
                } else {
                    // 检查是否有非ASCII字符
                    const hasNonAscii = /[^\x00-\x7F]/.test(numbersText);
                    if (hasNonAscii) {
                        if (!confirm("检测到内容包含汉字，但未上传字体文件。\n\n汉字将无法显示。建议取消并上传你发送给我的那个 .ttf 字体文件。是否仍要继续？")) {
                            setIsProcessing(false);
                            setStatusMsg("");
                            return;
                        }
                    }
                    font = await pdfDoc.embedFont(StandardFonts.Helvetica);
                }

                const pages = pdfDoc.getPages();
                const lines = numbersText.split('\n');

                // 颜色转换
                const r = parseInt(colorHex.slice(1, 3), 16) / 255;
                const g = parseInt(colorHex.slice(3, 5), 16) / 255;
                const b = parseInt(colorHex.slice(5, 7), 16) / 255;

                setStatusMsg("正在写入数据...");

                pages.forEach((page, idx) => {
                    if (idx < lines.length) {
                        const text = lines[idx].trim();
                        if (text) {
                            const { height } = page.getSize();
                            page.drawText(text, {
                                x: Number(offsetX),
                                y: height - Number(offsetY),
                                size: Number(fontSize),
                                font: font,
                                color: rgb(r, g, b),
                            });
                        }
                    }
                });

                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                // 保存状态以便“自动连招”
                setLastGeneratedPdfBytes(blob);
                setLastGeneratedFileName(`numbered_${file.name}`);
                setDownloadUrl({ url, filename: `numbered_${file.name}` });
                
                setStatusMsg("处理完成！");
                
                // 触发模态框
                setShowSortModal(true);

            } catch (err) {
                console.error(err);
                setError("处理出错：" + err.message);
            } finally {
                setIsProcessing(false);
            }
        };

        // --- 逻辑: 智能排序 (修复版) ---

        const processSorting = async () => {
            if (!file) return;
            setIsProcessing(true);
            setError("");
            setDownloadUrl(null);
            setStatusMsg("正在分析页面内容（请稍候）...");

            try {
                const arrayBuffer = await file.arrayBuffer();
                const loadingTask = pdfjsLib.getDocument(new Uint8Array(arrayBuffer));
                const pdf = await loadingTask.promise;
                
                const pageInfos = [];

                for (let i = 1; i <= pdf.numPages; i++) {
                    setStatusMsg(`正在扫描第 ${i} / ${pdf.numPages} 页...`);
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const viewport = page.getViewport({ scale: 1.0 });

                    // 1. 收集左上角区域的所有文字块
                    const candidates = [];
                    
                    for (const item of textContent.items) {
                        // item.transform 包含位置信息
                        const tx = item.transform[4]; 
                        const ty = item.transform[5]; 
                        
                        // 区域判定：左上角 (X < 40%, Y > 60%)
                        // PDF坐标系原点通常在左下角，所以 Y 大的是页面上方
                        const isTopLeft = tx < (viewport.width * 0.4) && ty > (viewport.height * 0.6);

                        if (isTopLeft) {
                            candidates.push({
                                str: item.str,
                                tx: tx,
                                ty: ty
                            });
                        }
                    }

                    // 2. 对候选文字按视觉位置排序
                    // 规则：先按 Y 轴从大到小（从页面上部往下），如果 Y 差不多，则按 X 轴从小到大（从左往右）
                    candidates.sort((a, b) => {
                        // 允许 10px 的行高误差
                        if (Math.abs(a.ty - b.ty) < 10) {
                            return a.tx - b.tx; // 同一行，按 X 从左到右
                        }
                        return b.ty - a.ty; // 不同行，按 Y 从大到小（从上到下）
                    });

                    // 3. 在排序后的列表中寻找第一个数字
                    let foundNumber = null;
                    for (const candidate of candidates) {
                        // 提取数字：支持 "No.123", "记-05", "12" 等
                        const match = candidate.str.match(/(\d+)/);
                        if (match) {
                            foundNumber = parseInt(match[0], 10);
                            break; // 找到第一个看起来像编号的数字就停止，因为我们已经排好序了
                        }
                    }

                    pageInfos.push({
                        originalIndex: i - 1,
                        number: foundNumber !== null ? foundNumber : Infinity // 没找到数字的放到最后
                    });
                }

                // 4. 执行排序
                setStatusMsg("正在重新排序页面...");
                pageInfos.sort((a, b) => a.number - b.number);

                // 5. 生成新 PDF
                const pdfDoc = await PDFDocument.load(arrayBuffer);
                const newPdf = await PDFDocument.create();
                const originalIndices = pageInfos.map(p => p.originalIndex);
                const copiedPages = await newPdf.copyPages(pdfDoc, originalIndices);

                copiedPages.forEach(page => newPdf.addPage(page));

                const pdfBytes = await newPdf.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                setDownloadUrl({ url, filename: `sorted_${file.name}` });
                setStatusMsg("排序完成！");

            } catch (err) {
                console.error(err);
                setError("排序失败：" + err.message);
            } finally {
                setIsProcessing(false);
            }
        };

        // --- 流程控制 ---

        const handleContinueToSort = async () => {
            if (lastGeneratedPdfBytes) {
                // 将刚刚生成的 PDF 转换为当前操作文件
                const newFile = new File([lastGeneratedPdfBytes], lastGeneratedFileName, { type: 'application/pdf' });
                
                // 更新状态
                setFile(newFile);
                setDownloadUrl(null); // 清除下载链接
                setError("");
                setStatusMsg("已载入带有编号的文件，准备排序...");
                
                // 重新加载页面信息
                await loadFileInfo(newFile);
                
                // 切换到排序标签页
                setActiveTab('sorting');
                setShowSortModal(false);
            }
        };

        return (
            <div className="min-h-screen py-10 px-4 sm:px-6 flex justify-center">
                
                {/* 自动连招提示框 */}
                <Modal 
                    isOpen={showSortModal} 
                    onClose={() => setShowSortModal(false)}
                    onConfirm={handleContinueToSort}
                    title="编号添加完成！"
                >
                    <p>文件已成功添加编号。您是否想直接使用这个新文件，按左上角的编号进行<strong>自动排序</strong>？</p>
                    <p className="text-xs text-gray-400 mt-2">点击“暂不需要”将停留在下载页面。</p>
                </Modal>

                <div className="max-w-5xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">
                    
                    {/* 左侧：操作区 */}
                    <div className="w-full md:w-1/2 p-6 flex flex-col border-r border-gray-100">
                        <div className="mb-6">
                            <h1 className="text-2xl font-bold text-gray-800">PDF 智能助手</h1>
                            <p className="text-sm text-gray-500">上传文件，选择功能</p>
                        </div>

                        {/* 文件上传区 */}
                        <div 
                            className={`mb-6 border-2 border-dashed rounded-xl p-4 flex flex-col items-center justify-center text-center cursor-pointer transition-colors 
                            ${file ? 'border-green-400 bg-green-50' : 'border-gray-300 hover:border-blue-400 hover:bg-blue-50'}`}
                            onClick={() => fileInputRef.current.click()}
                        >
                            <input type="file" ref={fileInputRef} className="hidden" accept=".pdf" onChange={handleFileChange} />
                            {file ? (
                                <div className="flex items-center gap-3">
                                    <div className="text-green-600"><IconFileText /></div>
                                    <div className="text-left">
                                        <p className="font-medium text-gray-800 text-sm truncate max-w-[200px]">{file.name}</p>
                                        <p className="text-xs text-gray-500">{pageCount} 页</p>
                                    </div>
                                </div>
                            ) : (
                                <div className="py-2">
                                    <div className="text-gray-400 mb-2 mx-auto w-min"><IconUpload /></div>
                                    <p className="text-sm text-gray-600">点击上传 PDF 文件</p>
                                </div>
                            )}
                        </div>

                        {/* 功能选项卡 */}
                        <div className="flex bg-gray-100 p-1 rounded-lg mb-6">
                            <button 
                                onClick={() => { setActiveTab('numbering'); setDownloadUrl(null); setError(""); }}
                                className={`flex-1 py-2 text-sm font-medium rounded-md transition-all flex justify-center items-center gap-2
                                ${activeTab === 'numbering' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                            >
                                <IconType /> 添加编号
                            </button>
                            <button 
                                onClick={() => { setActiveTab('sorting'); setDownloadUrl(null); setError(""); }}
                                className={`flex-1 py-2 text-sm font-medium rounded-md transition-all flex justify-center items-center gap-2
                                ${activeTab === 'sorting' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                            >
                                <IconSort /> 自动排序
                            </button>
                        </div>

                        {/* Tab 内容：编号 */}
                        {activeTab === 'numbering' && (
                            <div className="flex-1 flex flex-col space-y-5 animate-in">
                                {/* 字体上传 */}
                                <div className="bg-blue-50 p-3 rounded-lg border border-blue-100">
                                    <div className="flex justify-between items-center mb-1">
                                        <h3 className="text-xs font-bold text-blue-800 flex items-center gap-1">
                                            <IconFont /> 字体设置
                                        </h3>
                                        {fontFile && <span className="text-xs text-green-600 font-bold">已加载</span>}
                                    </div>
                                    <p className="text-xs text-blue-700 mb-2">请上传字体</p>
                                    <input 
                                        type="file" 
                                        accept=".ttf,.otf"
                                        onChange={handleFontChange}
                                        className="block w-full text-xs text-gray-500 file:mr-2 file:py-1 file:px-2 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-blue-200 file:text-blue-800 hover:file:bg-blue-300"
                                    />
                                </div>

                                <div className="space-y-3">
                                    <h3 className="text-sm font-semibold text-gray-700">样式与位置</h3>
                                    <div className="grid grid-cols-2 gap-3 text-sm">
                                        <div>
                                            <label className="text-xs text-gray-500">字体大小</label>
                                            <input type="number" value={fontSize} onChange={(e) => setFontSize(e.target.value)} className="w-full border rounded px-2 py-1" />
                                        </div>
                                        <div>
                                            <label className="text-xs text-gray-500">颜色 (默认黑色)</label>
                                            <div className="flex gap-2">
                                                <input type="color" value={colorHex} onChange={(e) => setColorHex(e.target.value)} className="h-7 w-8 rounded p-0 border-0 cursor-pointer" />
                                                <span className="text-xs leading-7 uppercase">{colorHex}</span>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-xs text-gray-500">X 坐标 (右移)</label>
                                            <input type="number" value={offsetX} onChange={(e) => setOffsetX(e.target.value)} className="w-full border rounded px-2 py-1" />
                                        </div>
                                        <div>
                                            <label className="text-xs text-gray-500">Y 坐标 (下移)</label>
                                            <input type="number" value={offsetY} onChange={(e) => setOffsetY(e.target.value)} className="w-full border rounded px-2 py-1" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Tab 内容：排序 */}
                        {activeTab === 'sorting' && (
                            <div className="flex-1 flex flex-col space-y-4 animate-in">
                                <div className="bg-yellow-50 p-4 rounded-lg border border-yellow-100 text-sm text-yellow-800 space-y-2">
                                    <p className="font-bold">功能说明：</p>
                                    <ul className="list-disc pl-4 space-y-1 text-xs">
                                        <li>程序将扫描每页 PDF 左上角的文字。</li>
                                        <li>自动提取其中的数字（如 "记-34" 提取为 34）。</li>
                                        <li>按照数字从小到大重新排列页面。</li>
                                        <li>未找到数字的页面将放在文档末尾。</li>
                                    </ul>
                                </div>
                            </div>
                        )}

                        {/* 底部按钮 */}
                        <div className="mt-auto pt-6">
                            {error && <div className="mb-3 text-xs text-red-600 bg-red-50 p-2 rounded">{error}</div>}
                            {statusMsg && <div className="mb-3 text-xs text-blue-600 text-center animate-pulse">{statusMsg}</div>}
                            
                            <button 
                                onClick={activeTab === 'numbering' ? processNumbering : processSorting}
                                disabled={!file || isProcessing}
                                className={`w-full py-3 rounded-xl font-bold text-white shadow transition-all transform active:scale-95 flex justify-center items-center gap-2
                                ${!file || isProcessing ? 'bg-gray-300 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 hover:shadow-lg'}`}
                            >
                                {isProcessing ? '处理中...' : (activeTab === 'numbering' ? '生成编号 PDF' : '开始智能排序')}
                            </button>
                        </div>
                    </div>

                    {/* 右侧：预览与结果 */}
                    <div className="w-full md:w-1/2 bg-gray-50 p-6 flex flex-col">
                        {downloadUrl ? (
                            <div className="h-full flex flex-col items-center justify-center animate-in">
                                <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-4 shadow-sm">
                                    <IconDownload />
                                </div>
                                <h2 className="text-xl font-bold text-gray-800 mb-2">处理完成！</h2>
                                <p className="text-sm text-gray-500 mb-6 text-center max-w-xs">
                                    你的文件已准备好。<br/>
                                    {showSortModal ? "正在等待下一步操作..." : "点击下方按钮下载。"}
                                </p>
                                <a 
                                    href={downloadUrl.url} 
                                    download={downloadUrl.filename}
                                    className="px-8 py-3 bg-green-600 text-white rounded-xl shadow-md hover:bg-green-700 font-medium transition-transform hover:-translate-y-1 flex items-center gap-2"
                                >
                                    <IconDownload size={18}/> 下载文件
                                </a>
                                <button onClick={() => setDownloadUrl(null)} className="mt-6 text-sm text-gray-400 hover:text-gray-600 underline">返回</button>
                            </div>
                        ) : (
                            activeTab === 'numbering' ? (
                                <div className="flex flex-col h-full">
                                    <h3 className="text-sm font-bold text-gray-700 mb-3 flex justify-between items-center">
                                        <span>编号列表预览</span>
                                        <span className="text-xs font-normal text-gray-400 bg-gray-200 px-2 py-0.5 rounded-full">可编辑</span>
                                    </h3>
                                    <div className="flex-1 border border-gray-200 rounded-xl bg-white overflow-hidden shadow-sm flex flex-col">
                                        <div className="bg-gray-100 px-4 py-2 text-xs text-gray-500 border-b flex gap-4">
                                            <span className="w-8">页码</span>
                                            <span>即将写入的内容</span>
                                        </div>
                                        <textarea 
                                            value={numbersText}
                                            onChange={(e) => setNumbersText(e.target.value)}
                                            className="flex-1 w-full p-4 resize-none text-sm font-mono text-gray-700 leading-relaxed focus:outline-none focus:bg-blue-50/30"
                                            placeholder="上传文件后，这里会显示自动生成的编号..."
                                        ></textarea>
                                    </div>
                                    <p className="mt-3 text-xs text-gray-400">
                                        提示：如果某一行留空，对应页面将不写入任何内容。     designed by xuxiangkun
                                    </p>
                                </div>
                            ) : (
                                <div className="flex flex-col items-center justify-center h-full text-gray-400 space-y-4">
                                    <div className="p-4 bg-white rounded-full shadow-sm"><IconSort /></div>
                                    <p className="text-sm text-center max-w-[200px]">点击左侧“开始智能排序”按钮，程序将自动分析并重排页面。</p>
                                </div>
                            )
                        )}
                    </div>

                </div>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>

</body>
</html>
